services:
  frontend:
    build:
      context: ./
      target: frontend-prod
    container_name: frontend
    ports:
      - "8080:80"
    networks:
      - frontend_net
    depends_on:
      backend:
        condition: service_started
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./
      target: backend-prod
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD_FILE: /run/secrets/mysql_root_password
      DB_NAME: ticketflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretjwtkey123
    secrets:
      - mysql_root_password
    networks:
      - backend_net
      - frontend_net
    depends_on:
      mysql:
        condition: service_healthy
  
  mysql:
    image: mysql:8
    container_name: mysql
    ports:
     - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ticketflow
    secrets:
      - mysql_root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend_net
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend_net
volumes:
  mysql_data:

networks:
  frontend_net:
  backend_net:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt