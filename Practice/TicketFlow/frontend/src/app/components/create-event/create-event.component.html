<div class="max-w-2xl mx-auto bg-white p-8 rounded shadow-md mt-6">
  <h2 class="text-2xl font-bold mb-6 text-center">Create New Event</h2>

  <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded mb-4">
    {{ error }}
  </div>
  
  <div *ngIf="message" class="bg-green-100 text-green-700 p-3 rounded mb-4">
    {{ message }}
  </div>

  <form (ngSubmit)="createEvent()">
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">Title</label>
      <input type="text" [(ngModel)]="eventData.title" name="title" class="w-full px-3 py-2 border rounded" required>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">Description</label>
      <textarea [(ngModel)]="eventData.description" name="description" class="w-full px-3 py-2 border rounded" rows="3"></textarea>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">Date</label>
      <input type="datetime-local" [(ngModel)]="eventData.date" name="date" class="w-full px-3 py-2 border rounded" required>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">Location</label>
      <input type="text" [(ngModel)]="eventData.location" name="location" class="w-full px-3 py-2 border rounded" required>
    </div>

    <div class="mb-4 grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700 font-bold mb-2">Total Tickets</label>
        <input type="number" [(ngModel)]="eventData.total_tickets" name="total_tickets" class="w-full px-3 py-2 border rounded" min="1" required>
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-2">Price ($)</label>
        <input type="number" [(ngModel)]="eventData.price" name="price" class="w-full px-3 py-2 border rounded" min="0" step="0.01" required>
      </div>
    </div>

    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700">
      Create Event
    </button>
  </form>
</div>
