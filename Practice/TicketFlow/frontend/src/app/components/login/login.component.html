<div class="max-w-md mx-auto bg-white p-8 border rounded-lg shadow-md mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center">{{ isLoginMode ? 'Login' : 'Register' }}</h2>
  
  <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded mb-4">
    {{ error }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <div class="mb-4" *ngIf="!isLoginMode">
      <label class="block text-gray-700 text-sm font-bold mb-2">Name</label>
      <input type="text" [(ngModel)]="user.name" name="name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
      <input type="email" [(ngModel)]="user.email" name="email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
      <input type="password" [(ngModel)]="user.password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" required>
    </div>

    <div class="mb-6" *ngIf="!isLoginMode">
      <label class="block text-gray-700 text-sm font-bold mb-2">Role</label>
      <select [(ngModel)]="user.role" name="role" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div class="flex items-center justify-between">
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full" type="submit">
        {{ isLoginMode ? 'Sign In' : 'Sign Up' }}
      </button>
    </div>
  </form>

  <div class="mt-4 text-center">
    <button (click)="toggleMode()" class="text-indigo-600 hover:text-indigo-800 text-sm">
      {{ isLoginMode ? 'Need an account? Register' : 'Already have an account? Login' }}
    </button>
  </div>
</div>
